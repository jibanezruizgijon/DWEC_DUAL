<section id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
      aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
      aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
      aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/carrusel/carrusel1.jpg" class="d-block w-100 img-carrusel" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/carrusel/carrusel2.jpg" class="d-block w-100 img-carrusel" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/carrusel/carrusel3.jpg" class="d-block w-100 img-carrusel" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</section>

<section class="mb-5 mt-5">
  <h3 class="fw-bold mb-4 border-start border-primary border-4 ps-3">Parques Temáticos</h3>
  <div class="d-flex overflow-auto pb-3 gap-3" style="scrollbar-width: thin;">
    @for (parque of parques; track parque.nombre) {
    <div class="card flex-shrink-0" style="width: 250px;">
      <img [src]="parque.imagen" class="card-img-top img-parque" alt="Imagen del parque">
      <div class="card-body text-center">
        <h6 class="fw-bold mb-0">{{ parque.nombre }}</h6>
      </div>
    </div>
    }
  </div>
</section>

<section>
  <h3 class="fw-bold mb-4 border-start border-success border-4 ps-3">Los Más Visitados</h3>
  <div class="row">
    @for (v of destacados; track v.ciudad) {
    <div class="col-md-4 mb-4">
     <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h5 class="card-title fw-bold">{{ v.ciudad }}</h5>
            <img [src]="v.imagen" class="card-img-top img-destacado" alt="Ciudad destacada">
            <p class="text-muted small mt-3">Visto por {{ v.visitas }} personas este mes</p>
          </div>
        </div>
    </div>
    }
  </div>
</section>
